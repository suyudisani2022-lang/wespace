  <link rel="manifest" href="/site.webmanifest">

<body class="auth">
  <!-- Top bar (same style as landing) -->
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="../index.html" aria-label="Go to weSPACE home">
        <div class="logo" aria-hidden="true">w</div>
        <div>
          <div class="brandname">weSPACE</div>
          <div class="brandtag">Social commerce • Shops • Opportunities</div>
        </div>
      </a>

      <nav class="top-actions" aria-label="Quick actions">
        <a class="link" href="../index.html">Back</a>
        <a class="link" href="../home.html">Browse</a>
      </nav>
    </div>
  </header>

  <main class="auth-shell">
    <div class="auth-card">
      <div class="auth-head">
        <h1 class="auth-title">Create your weSPACE account</h1>
        
      </div>

      <form id="registerForm" class="auth-form">
        <div class="grid2">
          <label class="field">
            <span>Username</span>
            <input id="regUsername" type="text" required placeholder="e.g. musa_store">
          </label>

          <label class="field">
            <span>Full Name</span>
            <input id="regName" type="text" required placeholder="e.g. Suyudi Sani">
          </label>
        </div>

        <div class="grid2">
          <label class="field">
            <span>Skills / Trade</span>
            <input id="regCampus" type="text" required placeholder="e.g.Graphic designer / student ">
          </label>

          <label class="field">
            <span>Brandname / Campus(if student)</span>
            <input id="regDept" type="text" required placeholder="e.g. meedas cakes and more/ bayero Uni">
          </label>
        </div>

        <label class="field">
          <span>Email</span>
          <input id="regEmail" type="email" required autocomplete="email" placeholder="you@example.com">
        </label>

        <div class="grid2">
          <label class="field">
            <span>Password</span>
            <input id="regPassword" type="password" required placeholder="Create a password">
          </label>

          <label class="field">
            <span>Repeat Password</span>
            <input id="regPassword2" type="password" required placeholder="Repeat password">
          </label>
        </div>

        <label class="field">
          <span>Profile Photo</span>
          <input id="regPhoto" type="file" accept="image/*" required>
          
        </label>

        <button class="btn primary full" type="submit">Create Account</button>

        <div class="tiny center">
          Already have an account?
          <a class="link2" href="../index.html">Log in</a>
        </div>
      </form>
    </div>
  </main>

  <script type="module" src="../js/register-supabase.js"></script>
