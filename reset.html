<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password • weSPACE</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth">
  <main>
    <div class="auth-card">
      <h1 class="auth-title">Reset your password</h1>
      <p class="auth-subtitle">Enter a new password for your account.</p>

      <form id="resetForm" class="auth-form">
        <label class="field">
          <span>New password</span>
          <input id="newPass" type="password" required minlength="6" />
        </label>

        <label class="field">
          <span>Repeat new password</span>
          <input id="newPass2" type="password" required minlength="6" />
        </label>

        <button class="btn primary" type="submit">Update Password</button>
        <div class="tiny" style="margin-top:10px;">
          After reset, you’ll be sent back to login.
        </div>
      </form>
    </div>
  </main>

  <script type="module" src="js/reset-password.js"></script>
</body>
</html>
