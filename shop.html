<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>weSPACE Shop</title>
  <link rel="stylesheet" href="css/style.css?v=3" />
  <style>
    /* ── SHOP HEADER ── */
    .shop-page-banner {
      width: 100%; height: 160px; object-fit: cover; display: block;
      background: linear-gradient(135deg, #1e40af, #2563eb);
    }
    .shop-page-banner-ph {
      width: 100%; height: 160px;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      display: flex; align-items: center; justify-content: center; font-size: 50px;
    }
    .shop-page-logo-wrap { margin-top: -30px; margin-left: 16px; display: inline-block; }
    .shop-page-logo {
      width: 60px; height: 60px; border-radius: 12px; border: 3px solid #fff;
      object-fit: cover; background: #dbeafe; box-shadow: 0 2px 8px rgba(0,0,0,.18); display: block;
    }
    .shop-page-logo-ph {
      width: 60px; height: 60px; border-radius: 12px; border: 3px solid #fff;
      background: #dbeafe; box-shadow: 0 2px 8px rgba(0,0,0,.18);
      display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .shop-page-info { padding: 6px 16px 14px; }
    .shop-page-name { font-size: 20px; font-weight: 900; color: #0f172a; display: flex; align-items: center; gap: 8px; }
    .shop-page-verified { background: #dcfce7; color: #15803d; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
    .shop-page-meta { font-size: 12px; color: #64748b; margin-top: 3px; }
    .shop-page-actions { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .shop-wa-pill { background: #25d366; color: #fff; border: none; padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .shop-share-pill { background: #f1f5f9; color: #0f172a; border: none; padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 700; cursor: pointer; }

    /* ── MANAGEMENT TABS ── */
    .mgmt-tabs { display: flex; border-bottom: 2px solid #e5e7eb; margin: 16px 0 0; }
    .mgmt-tab { flex: 1; padding: 11px 8px; font-size: 13px; font-weight: 700; color: #64748b; background: none; border: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.15s; margin-bottom: -2px; }
    .mgmt-tab.active { color: #2563eb; border-bottom-color: #2563eb; }
    .mgmt-panel { display: none; padding: 14px 0 80px; }
    .mgmt-panel.active { display: block; }

    /* ── NEW CATALOGUE BOX ── */
    .new-cat-box { background: #f8fafc; border: 1.5px dashed #cbd5e1; border-radius: 12px; padding: 14px; margin-bottom: 20px; }
    .new-cat-box-title { font-size: 14px; font-weight: 800; color: #0f172a; margin-bottom: 10px; }

    /* ── OWNER CATALOGUE MGMT CARD ── */
    .mgmt-cat-card { background: #fff; border: 1.5px solid #e5e7eb; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .mgmt-cat-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; justify-content: space-between; }
    .mgmt-cat-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .mgmt-cat-cover { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; background: #f1f5f9; flex-shrink: 0; }
    .mgmt-cat-cover-ph { width: 42px; height: 42px; border-radius: 8px; background: #eff6ff; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .mgmt-cat-name { font-size: 14px; font-weight: 800; color: #0f172a; }
    .mgmt-cat-count { font-size: 11px; color: #64748b; margin-top: 1px; }
    .mgmt-cat-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .mgmt-cat-expand { background: #eff6ff; color: #2563eb; border: none; font-size: 11px; font-weight: 700; padding: 6px 10px; border-radius: 7px; cursor: pointer; }
    .mgmt-cat-add    { background: #2563eb; color: #fff;    border: none; font-size: 11px; font-weight: 700; padding: 6px 10px; border-radius: 7px; cursor: pointer; }
    .mgmt-cat-del    { background: #fee2e2; color: #dc2626; border: none; font-size: 11px; font-weight: 700; padding: 6px 10px; border-radius: 7px; cursor: pointer; }

    /* inline products inside mgmt card */
    .mgmt-prod-list { border-top: 1px solid #f1f5f9; padding: 0 14px 8px; display: none; }
    .mgmt-prod-list.open { display: block; }
    .mgmt-prod-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f8fafc; }
    .mgmt-prod-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; background: #f1f5f9; flex-shrink: 0; }
    .mgmt-prod-thumb-ph { width: 44px; height: 44px; border-radius: 8px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .mgmt-prod-info { flex: 1; min-width: 0; }
    .mgmt-prod-name { font-size: 13px; font-weight: 700; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mgmt-prod-price { font-size: 11px; color: #2563eb; font-weight: 700; margin-top: 2px; }
    .mgmt-prod-del { background: #fee2e2; color: #dc2626; border: none; font-size: 11px; font-weight: 700; padding: 5px 8px; border-radius: 6px; cursor: pointer; }

    /* ── SETUP PANEL LABELS ── */
    .setup-label { font-size: 12px; font-weight: 800; color: #2563eb; text-transform: uppercase; letter-spacing: .04em; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1.5px solid #e5e7eb; }
    .setup-preview-banner { width: 100%; height: 90px; object-fit: cover; border-radius: 10px; margin-top: 6px; display: none; }
    .setup-preview-logo   { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; margin-top: 6px; display: none; }

    /* ── ADD PRODUCT BOTTOM SHEET ── */
    .add-prod-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 700; align-items: flex-end; justify-content: center; }
    .add-prod-overlay.show { display: flex; }
    .add-prod-sheet { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; padding: 20px 16px 48px; max-height: 92vh; overflow-y: auto; animation: slideUp .22s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .add-prod-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .add-prod-title { font-size: 15px; font-weight: 800; color: #0f172a; }
    .add-prod-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b; padding: 4px; }

    /* ── PRODUCT DETAIL SHEET (flash/feed) ── */
    .prod-detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 700; align-items: flex-end; justify-content: center; }
    .prod-detail-overlay.show { display: flex; }
    .prod-detail-sheet { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; padding: 20px 16px 48px; max-height: 92vh; overflow-y: auto; animation: slideUp .22s ease; }
    .prod-detail-close-row { display: flex; justify-content: flex-end; margin-bottom: 10px; }
    .prod-detail-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #64748b; }
    .prod-detail-img { width: 100%; border-radius: 12px; object-fit: cover; max-height: 280px; display: block; margin-bottom: 14px; background: #f1f5f9; }
    .prod-detail-name { font-size: 18px; font-weight: 900; color: #0f172a; margin-bottom: 6px; }
    .prod-detail-prices { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .prod-detail-sale { font-size: 20px; font-weight: 900; color: #ef4444; }
    .prod-detail-orig { font-size: 14px; color: #94a3b8; text-decoration: line-through; }
    .prod-detail-desc { font-size: 14px; color: #475569; line-height: 1.5; margin-bottom: 16px; }
    .prod-detail-wa { background: #25d366; color: #fff; border: none; width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

    /* ── BACK BUTTON ── */
    .back-to-cat-btn { display: inline-flex; align-items: center; gap: 6px; background: #f1f5f9; color: #0f172a; border: none; padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 14px; }

    /* ── VISITOR PRODUCT GRID (uses original .shop-grid + .shop-tile CSS) ── */
    .catalogue-card { cursor: pointer; }
    .catalogue-card-img { width: 100%; aspect-ratio: 4/3; overflow: hidden; border-radius: 10px 10px 0 0; background: #f1f5f9; display: flex; align-items: center; justify-content: center; }
    .catalogue-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .catalogue-card-name { padding: 10px 12px; font-size: 14px; font-weight: 600; color: #0f172a; }
  </style>
</head>
<body>

<header class="topbar">
  <button id="shopBackBtn" class="icon-btn" type="button" aria-label="Back">←</button>
  <div id="topbarTitle" style="font-weight:700;">Shop</div>
  <button id="copyShopLinkBtn" class="icon-btn" type="button" title="Share shop" style="font-size:18px;">🔗</button>
</header>

<main class="page" style="padding-top:60px;padding-bottom:0;">
  <div class="container" style="padding:0;max-width:100%;">

    <!-- SHOP BANNER -->
    <div id="shopBannerPlaceholder" class="shop-page-banner-ph">🏪</div>
    <img id="shopBannerImg" class="shop-page-banner" alt="Shop banner" style="display:none;" loading="lazy" />

    <!-- SHOP LOGO -->
    <div class="shop-page-logo-wrap">
      <div id="shopLogoPlaceholder" class="shop-page-logo-ph">🏬</div>
      <img id="shopLogoImg" class="shop-page-logo" alt="Shop logo" style="display:none;" loading="lazy" />
    </div>

    <!-- SHOP INFO -->
    <div class="shop-page-info">
      <div class="shop-page-name">
        <span id="shopTitle">Shop</span>
        <span id="shopVerifiedBadge" class="shop-page-verified" style="display:none;">✔ Verified</span>
      </div>
      <div class="shop-page-meta" id="shopMeta"></div>
      <div class="shop-page-actions">
        <button id="shopWaBtn" class="shop-wa-pill" style="display:none;">
          <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" style="width:16px;" alt="WA"> WhatsApp
        </button>
        <button id="shopShareBtn" class="shop-share-pill">🔗 Share Shop</button>
      </div>
      <!-- Social handles — shown only if seller has added them -->
      <div id="shopSocialRow" style="display:none;margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;"></div>
    </div>

    <!-- ══════════════════════════════ -->
    <!-- OWNER PANEL                   -->
    <!-- ══════════════════════════════ -->
    <div id="ownerPanel" style="display:none; padding:0 14px;">
      <nav class="mgmt-tabs">
        <button class="mgmt-tab active" data-panel="catalogues" type="button">📦 Catalogues</button>
        <button class="mgmt-tab" data-panel="setup" type="button">⚙️ Shop Setup</button>
      </nav>

      <!-- CATALOGUES TAB -->
      <div class="mgmt-panel active" id="panel-catalogues">
        <div class="new-cat-box">
          <div class="new-cat-box-title">➕ Create New Catalogue</div>
          <label class="field">
            <span>Catalogue name</span>
            <input id="catName" type="text" maxlength="40" placeholder="e.g. Bags, Phones, Shoes" />
          </label>
          <label class="field">
            <span>Cover image (optional)</span>
            <input id="catCover" type="file" accept="image/*" />
          </label>
          <button class="btn primary" id="createCatalogueBtn" type="button">Create Catalogue</button>
        </div>
        <div id="catalogueMgmtList">
          <div style="text-align:center;padding:30px;color:#64748b;">Loading…</div>
        </div>
      </div>

      <!-- SETUP TAB -->
      <div class="mgmt-panel" id="panel-setup">
        <div class="setup-label">Basic Info</div>
        <label class="field">
          <span>Shop name</span>
          <input id="setupShopName" type="text" maxlength="60" placeholder="e.g. Amina's Boutique" />
        </label>
        <label class="field">
          <span>WhatsApp number</span>
          <input id="setupWhatsApp" type="text" maxlength="20" placeholder="+234..." />
        </label>
        <label class="field">
          <span>City</span>
          <select id="setupCity">
            <option value="">Select city</option>
            <option>Kano</option><option>Kaduna</option><option>Sokoto</option>
            <option>Maiduguri</option><option>Katsina</option><option>Zaria</option>
            <option>Bauchi</option><option>Minna</option><option>Other</option>
          </select>
        </label>
        <label class="field">
          <span>Market / Area</span>
          <input id="setupMarket" type="text" maxlength="60" placeholder="e.g. Kwari Market" />
        </label>
        <label class="field">
          <span>Category</span>
          <select id="setupCategory">
            <option value="">Select category</option>
            <option>Phones & Gadgets</option><option>Fashion & Clothing</option>
            <option>Shoes & Bags</option><option>Perfumes & Beauty</option>
            <option>Food & Groceries</option><option>Electronics</option>
            <option>Fabric & Textiles</option><option>Furniture & Home</option>
            <option>Services</option>
          </select>
        </label>

        <div class="setup-label">Branding</div>
        <label class="field">
          <span>Shop banner image</span>
          <input id="setupBanner" type="file" accept="image/*" />
          <img id="setupBannerPreview" class="setup-preview-banner" alt="Banner preview" />
        </label>
        <label class="field">
          <span>Shop logo</span>
          <input id="setupLogo" type="file" accept="image/*" />
          <img id="setupLogoPreview" class="setup-preview-logo" alt="Logo preview" />
        </label>

        <div class="setup-label">About Your Shop</div>
        <label class="field">
          <span>About Shop</span>
          <textarea id="setupAbout" rows="3" maxlength="300" placeholder="Describe what you sell, delivery options, location…"></textarea>
        </label>

        <div class="setup-label">Social Handles</div>
        <label class="field">
          <span>Instagram username</span>
          <input id="setupIG" type="text" maxlength="60" placeholder="@yourusername" />
        </label>
        <label class="field">
          <span>TikTok username</span>
          <input id="setupTT" type="text" maxlength="60" placeholder="@yourusername" />
        </label>

        <button class="btn primary" id="saveSetupBtn" type="button" style="width:100%;margin-top:18px;">
          💾 Save Shop Settings
        </button>
      </div>
    </div>

    <!-- ══════════════════════════════ -->
    <!-- VISITOR PANEL                 -->
    <!-- ══════════════════════════════ -->
    <div id="visitorPanel" style="display:none; padding:0 14px;">
      <!-- Catalogue grid — uses .shop-card CSS from style.css -->
      <div id="catalogueGrid" class="shop-grid" style="margin-top:14px; padding-bottom:80px;"></div>

      <!-- Product view inside a catalogue -->
      <div id="catalogueView" style="display:none; margin-top:8px;">
        <button id="backToCatalogues" class="back-to-cat-btn">← Catalogues</button>
        <h3 id="catalogueNameTitle" style="font-size:15px;font-weight:800;color:#0f172a;margin-bottom:12px;"></h3>
        <div id="productGrid" class="shop-grid" style="padding-bottom:80px;"></div>
      </div>
    </div>

  </div>
</main>

<!-- ADD PRODUCT BOTTOM SHEET -->
<div class="add-prod-overlay" id="addProdModal" aria-hidden="true">
  <div class="add-prod-sheet">
    <div class="add-prod-header">
      <div class="add-prod-title">Add to: <span id="addProdCatName" style="color:#2563eb;"></span></div>
      <button class="add-prod-close" id="closeAddProdModal" type="button">✕</button>
    </div>
    <label class="field"><span>Product name</span><input id="productName" type="text" placeholder="e.g. iPhone 11 128GB" maxlength="80" /></label>
    <label class="field"><span>Sale / regular price</span><input id="prodPrice" type="text" maxlength="20" placeholder="e.g. ₦25,000" /></label>
    <label class="field"><span>Original price (for discounts, optional)</span><input id="prodOrigPrice" type="text" maxlength="20" placeholder="e.g. ₦30,000" /></label>
    <label class="field"><span>Description (optional)</span><textarea id="prodDesc" rows="2" maxlength="200" placeholder="Short description…"></textarea></label>
    <label class="field"><span>Product images (up to 5)</span><input id="prodImage" type="file" accept="image/*" multiple /></label>
    <button class="btn primary" id="addProductBtn" type="button" style="width:100%;margin-top:14px;">Add Product</button>
  </div>
</div>

<!-- PRODUCT DETAIL MODAL (flash / feed product) -->
<div class="prod-detail-overlay" id="prodDetailModal" aria-hidden="true">
  <div class="prod-detail-sheet">
    <div class="prod-detail-close-row">
      <button class="prod-detail-close" id="closeProdDetail" type="button">✕</button>
    </div>
    <div id="prodDetailBody"></div>
  </div>
</div>

<!-- ABOUT SHOP MODAL -->
<div id="shopAboutModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:700;align-items:flex-end;justify-content:center;">
  <div style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:24px 18px 48px;animation:slideUp .22s ease;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div style="font-size:16px;font-weight:800;color:#0f172a;">ℹ️ About this Shop</div>
      <button onclick="document.getElementById('shopAboutModal').style.display='none'"
        style="background:none;border:none;font-size:22px;cursor:pointer;color:#64748b;">✕</button>
    </div>
    <div id="shopAboutText" style="font-size:14px;color:#475569;line-height:1.6;"></div>
  </div>
</div>

<!-- FULLSCREEN IMAGE LIGHTBOX -->
<div id="imgModal" class="img-modal" aria-hidden="true">
  <button id="imgModalClose" class="img-modal-close" type="button">✕</button>
  <img id="imgModalImg" alt="Full image" />
</div>

<script type="module" src="js/shop.js?v=4"></script>
</body>
</html>
