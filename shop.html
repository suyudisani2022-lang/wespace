<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>weSPACE Shop</title>
  <link rel="stylesheet" href="css/style.css?v=3" />
  <style>
    /* ── SHOP MANAGEMENT TABS ── */
    .mgmt-tabs {
      display: flex; gap: 0; border-bottom: 2px solid #e5e7eb;
      margin: 14px 0 0; background: #fff; border-radius: 12px 12px 0 0; overflow: hidden;
    }
    .mgmt-tab {
      flex: 1; padding: 12px 8px; font-size: 13px; font-weight: 700;
      color: #64748b; background: none; border: none; cursor: pointer;
      border-bottom: 3px solid transparent; transition: all 0.15s;
    }
    .mgmt-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: #f8fafc; }
    .mgmt-panel { display: none; padding: 16px 0; }
    .mgmt-panel.active { display: block; }

    /* ── SHOP HEADER ── */
    .shop-hero { position: relative; margin-bottom: 12px; }
    .shop-banner-img { width: 100%; height: 140px; object-fit: cover; border-radius: 14px; display: block; background: linear-gradient(135deg,#1e40af,#2563eb); }
    .shop-banner-placeholder { width: 100%; height: 140px; background: linear-gradient(135deg,#1e40af,#2563eb); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .shop-logo-wrap { position: absolute; bottom: -22px; left: 16px; }
    .shop-logo-img { width: 52px; height: 52px; border-radius: 12px; border: 3px solid #fff; object-fit: cover; background: #dbeafe; box-shadow: 0 2px 8px rgba(0,0,0,.14); display: block; }
    .shop-logo-placeholder { width: 52px; height: 52px; border-radius: 12px; border: 3px solid #fff; background: #dbeafe; box-shadow: 0 2px 8px rgba(0,0,0,.14); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .shop-info-bar { margin-top: 28px; padding: 0 4px; }
    .shop-name-row { display: flex; align-items: center; gap: 8px; }
    .shop-name-h { font-size: 20px; font-weight: 900; color: #0f172a; }
    .shop-verified-badge { background: #dcfce7; color: #15803d; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; }
    .shop-meta-row { font-size: 12px; color: #64748b; margin-top: 4px; }

    /* ── CATALOGUE CARD ── */
    .cat-mgmt-card {
      background: #fff; border: 1.5px solid #e5e7eb; border-radius: 14px;
      padding: 14px 14px 12px; margin-bottom: 12px; position: relative;
    }
    .cat-mgmt-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cat-mgmt-card-name { font-size: 15px; font-weight: 800; color: #0f172a; }
    .cat-mgmt-card-count { font-size: 11px; color: #64748b; }
    .cat-mgmt-card-actions { display: flex; gap: 8px; }
    .cat-mgmt-expand-btn { background: #eff6ff; color: #2563eb; border: none; font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
    .cat-mgmt-add-btn { background: #2563eb; color: #fff; border: none; font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
    .cat-mgmt-products { display: none; margin-top: 10px; }
    .cat-mgmt-products.open { display: block; }
    .cat-prod-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid #f1f5f9; }
    .cat-prod-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; background: #f1f5f9; border: 1px solid #e5e7eb; flex-shrink: 0; }
    .cat-prod-info { flex: 1; min-width: 0; }
    .cat-prod-name { font-size: 13px; font-weight: 700; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cat-prod-price { font-size: 11px; color: #2563eb; font-weight: 700; margin-top: 2px; }
    .cat-prod-del { background: #fee2e2; color: #dc2626; border: none; font-size: 11px; font-weight: 700; padding: 5px 9px; border-radius: 7px; cursor: pointer; flex-shrink: 0; }

    /* ── ADD PRODUCT MODAL ── */
    .add-prod-modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 600; align-items: flex-end; justify-content: center;
    }
    .add-prod-modal-overlay.show { display: flex; }
    .add-prod-modal {
      background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 600px;
      padding: 20px 16px 40px; max-height: 90vh; overflow-y: auto;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .add-prod-modal-title { font-size: 16px; font-weight: 800; color: #0f172a; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
    .add-prod-close { background: none; border: none; font-size: 18px; cursor: pointer; color: #64748b; }

    /* ── CREATE CATALOGUE FORM ── */
    .create-cat-form { background: #f8fafc; border: 1.5px dashed #cbd5e1; border-radius: 12px; padding: 14px; margin-bottom: 18px; }
    .create-cat-form-title { font-size: 14px; font-weight: 800; color: #0f172a; margin-bottom: 10px; }

    /* ── SETUP FORM ── */
    .setup-section-title { font-size: 13px; font-weight: 800; color: #2563eb; text-transform: uppercase; letter-spacing: 0.04em; margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 1.5px solid #e5e7eb; }
    .setup-img-preview { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; margin-top: 6px; display: none; }
    .setup-logo-preview { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; margin-top: 6px; display: none; }

    /* ── VISITOR VIEW (no manage panel) ── */
    .visitor-cat-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 14px;
      overflow: hidden; cursor: pointer; transition: box-shadow 0.15s;
      margin-bottom: 12px;
    }
    .visitor-cat-banner { width: 100%; height: 90px; object-fit: cover; background: linear-gradient(135deg,#1e40af,#2563eb); display: block; }
    .visitor-cat-body { padding: 10px 12px; }
    .visitor-cat-name { font-size: 14px; font-weight: 800; color: #0f172a; }
    .visitor-cat-count { font-size: 11px; color: #64748b; margin-top: 2px; }

    .shop-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; padding-bottom: 80px; }
    @media (min-width: 480px) { .shop-grid { grid-template-columns: repeat(3,1fr); } }
  </style>
</head>
<body>

<header class="topbar">
  <button id="shopBackBtn" class="icon-btn" type="button" aria-label="Back">←</button>
  <div id="topbarTitle" style="font-weight:700;">Shop</div>
  <button id="copyShopLinkBtn" class="icon-btn" type="button" title="Copy shop link" style="font-size:16px;">🔗</button>
</header>

<main class="page">
  <div class="container">

    <!-- SHOP HERO (always visible) -->
    <div class="shop-hero" id="shopHero">
      <div class="shop-banner-placeholder" id="shopBannerPlaceholder">🏪</div>
      <img class="shop-banner-img" id="shopBannerImg" alt="Shop banner" style="display:none;" loading="lazy" />
      <div class="shop-logo-wrap">
        <div class="shop-logo-placeholder" id="shopLogoPlaceholder">🏬</div>
        <img class="shop-logo-img" id="shopLogoImg" alt="Shop logo" style="display:none;" loading="lazy" />
      </div>
    </div>

    <div class="shop-info-bar">
      <div class="shop-name-row">
        <span class="shop-name-h" id="shopTitle">Shop</span>
        <span id="shopVerifiedBadge" class="shop-verified-badge" style="display:none;">✔ Verified</span>
      </div>
      <div class="shop-meta-row" id="shopMeta"></div>
    </div>

    <!-- ══════════════════════════════════════════ -->
    <!-- OWNER MANAGEMENT (shown only to shop owner) -->
    <!-- ══════════════════════════════════════════ -->
    <div id="ownerPanel" style="display:none;">
      <nav class="mgmt-tabs">
        <button class="mgmt-tab active" data-panel="catalogues" type="button">📦 Catalogues</button>
        <button class="mgmt-tab" data-panel="setup" type="button">⚙️ Shop Setup</button>
      </nav>

      <!-- PANEL: CATALOGUE MANAGEMENT -->
      <div class="mgmt-panel active" id="panel-catalogues">

        <!-- Create new catalogue -->
        <div class="create-cat-form">
          <div class="create-cat-form-title">➕ New Catalogue</div>
          <label class="field">
            <span>Catalogue name (e.g. Bags, Phones)</span>
            <input id="catName" type="text" maxlength="40" placeholder="e.g. Bags" />
          </label>
          <label class="field">
            <span>Cover image (optional)</span>
            <input id="catCover" type="file" accept="image/*" />
          </label>
          <button class="btn primary" id="createCatalogueBtn" type="button">Create Catalogue</button>
        </div>

        <!-- Existing catalogues with expandable product lists -->
        <div id="catalogueMgmtList">
          <div style="text-align:center;padding:30px;color:#64748b;">Loading catalogues…</div>
        </div>
      </div>

      <!-- PANEL: SHOP SETUP -->
      <div class="mgmt-panel" id="panel-setup">
        <div class="setup-section-title">Basic Info</div>
        <label class="field">
          <span>Shop name</span>
          <input id="setupShopName" type="text" maxlength="60" placeholder="e.g. Amina's Boutique" />
        </label>
        <label class="field">
          <span>WhatsApp number</span>
          <input id="setupWhatsApp" type="text" maxlength="20" placeholder="+234..." />
        </label>
        <label class="field">
          <span>City</span>
          <select id="setupCity">
            <option value="">Select city</option>
            <option>Kano</option><option>Kaduna</option><option>Sokoto</option>
            <option>Maiduguri</option><option>Katsina</option><option>Zaria</option>
            <option>Bauchi</option><option>Minna</option><option>Other</option>
          </select>
        </label>
        <label class="field">
          <span>Market / Area</span>
          <input id="setupMarket" type="text" maxlength="60" placeholder="e.g. Kwari Market" />
        </label>
        <label class="field">
          <span>Category</span>
          <select id="setupCategory">
            <option value="">Select category</option>
            <option>Phones & Gadgets</option><option>Fashion & Clothing</option>
            <option>Shoes & Bags</option><option>Perfumes & Beauty</option>
            <option>Food & Groceries</option><option>Electronics</option>
            <option>Fabric & Textiles</option><option>Furniture & Home</option><option>Services</option>
          </select>
        </label>

        <div class="setup-section-title">Branding</div>
        <label class="field">
          <span>Shop banner image</span>
          <input id="setupBanner" type="file" accept="image/*" />
          <img id="setupBannerPreview" class="setup-img-preview" alt="Banner preview" />
        </label>
        <label class="field">
          <span>Shop logo image</span>
          <input id="setupLogo" type="file" accept="image/*" />
          <img id="setupLogoPreview" class="setup-logo-preview" alt="Logo preview" />
        </label>

        <div style="margin-top:16px;">
          <button class="btn primary" id="saveSetupBtn" type="button" style="width:100%;">💾 Save Shop Settings</button>
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════ -->
    <!-- VISITOR VIEW (shown to non-owners) -->
    <!-- ══════════════════════════════════════════ -->
    <div id="visitorPanel" style="display:none;">
      <p class="panel-hint" id="shopHint" style="margin:10px 0 14px;">Browse catalogues</p>
      <div id="catalogueGrid" class="shop-grid"></div>

      <!-- Catalogue product view (slides in) -->
      <div id="catalogueView" style="display:none; margin-top:12px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <button id="backToCatalogues" class="btn ghost" type="button" style="padding:6px 12px;">← Back</button>
          <div class="panel-title" id="catalogueNameTitle" style="margin:0;">Catalogue</div>
        </div>
        <div id="productGrid" class="shop-grid"></div>
      </div>
    </div>

  </div>
</main>

<!-- ADD PRODUCT MODAL (owner only) -->
<div class="add-prod-modal-overlay" id="addProdModal" aria-hidden="true">
  <div class="add-prod-modal">
    <div class="add-prod-modal-title">
      <span>Add Product to <span id="addProdCatName">Catalogue</span></span>
      <button class="add-prod-close" id="closeAddProdModal" type="button">✕</button>
    </div>
    <label class="field">
      <span>Product name</span>
      <input id="productName" type="text" placeholder="e.g. iPhone 11 128GB" maxlength="80" />
    </label>
    <label class="field">
      <span>Price</span>
      <input id="prodPrice" type="text" maxlength="20" placeholder="₦5,000" />
    </label>
    <label class="field">
      <span>Description (optional)</span>
      <textarea id="prodDesc" rows="2" maxlength="200" placeholder="Short description…"></textarea>
    </label>
    <label class="field">
      <span>Product images (up to 5)</span>
      <input id="prodImage" type="file" accept="image/*" multiple />
    </label>
    <div style="margin-top:14px;">
      <button class="btn primary" id="addProductBtn" type="button" style="width:100%;">Add Product</button>
    </div>
  </div>
</div>

<!-- FULLSCREEN IMAGE MODAL -->
<div id="imgModal" class="img-modal" aria-hidden="true">
  <button id="imgModalClose" class="img-modal-close" type="button">✕</button>
  <img id="imgModalImg" alt="Full image" />
</div>

<script type="module" src="js/shop.js?v=3"></script>
</body>
</html>
